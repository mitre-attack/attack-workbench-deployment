apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base

components:
- ../../components/taxii

labels:
- pairs:
    environment: pre-prod
  includeSelectors: false

images:
- name: ghcr.io/mitre-attack/attack-workbench-frontend
  newTag: latest
- name: ghcr.io/mitre-attack/attack-workbench-rest-api
  newTag: latest
- name: ghcr.io/mitre-attack/attack-workbench-taxii-server
  newTag: latest

patches:
- path: patch-resources.yaml
- path: patch-rest-api-env.yaml
- target:
    kind: Ingress
    name: attack-workbench-ingress
  path: patch-ingress.yaml

replicas:
- name: frontend
  count: 1
- name: rest-api
  count: 1
