apiVersion: apps/v1
kind: Deployment
metadata:
  name: rest-api
  labels:
    app.kubernetes.io/name: rest-api
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rest-api
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rest-api
        app.kubernetes.io/component: api
    spec:
      containers:
      - name: rest-api
        image: ghcr.io/mitre-attack/attack-workbench-rest-api:latest
        ports:
        - name: http
          containerPort: 3000
        envFrom:
        - configMapRef:
            name: rest-api-env
        - secretRef:
            name: rest-api-secrets
        volumeMounts:
        - name: config-volume
          mountPath: /usr/src/app/resources/rest-api-service-config.json
          subPath: rest-api-service-config.json
        livenessProbe:
          httpGet:
            path: /api/health/ping
            port: http
          initialDelaySeconds: 30
          timeoutSeconds: 10
          periodSeconds: 30
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health/ping
            port: http
          initialDelaySeconds: 5
          timeoutSeconds: 10
          periodSeconds: 10
          failureThreshold: 3
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
      volumes:
      - name: config-volume
        configMap:
          name: rest-api-config
