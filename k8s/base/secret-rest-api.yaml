apiVersion: v1
kind: Secret
metadata:
  name: rest-api-secrets
  labels:
    app.kubernetes.io/name: rest-api
    app.kubernetes.io/component: api
type: Opaque
stringData:
  # Database connection string
  DATABASE_URL: "mongodb://attack-workbench-database:27017/attack-workspace"

  # Optional secrets. Leave these keys absent for local/dev deployments so the
  # REST API can generate startup defaults. For production, set non-empty stable
  # values through an overlay or external secret manager.
  # Generate values with:
  #   node -e "console.log(require('crypto').randomBytes(48).toString('base64'))"
  # SESSION_SECRET: ""
  # MONGOSTORE_CRYPTO_SECRET: ""
  # WB_REST_TOKEN_SIGNING_SECRET: ""

  # OIDC secrets. Set these only when AUTHN_MECHANISM=oidc.
  # AUTHN_OIDC_CLIENT_ID: ""
  # AUTHN_OIDC_CLIENT_SECRET: ""
